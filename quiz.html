<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคัดเลือกแบบทดสอบ - KTCM</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <script>
        // 1. ตรวจสอบสถานะล็อกอินปัจจุบันในระบบ
        if (!sessionStorage.getItem('isLoggedIn') || !localStorage.getItem('userName')) {
            sessionStorage.clear();
            localStorage.removeItem('userName');
            window.location.replace('login.html'); // เตะกลับหน้าแรกและล้างประวัติการเข้าชมทันที
        }

        // 2. ป้องกันการกดปุ่ม ย้อนกลับ-ถัดไป (Back-Forward Cache) ของเบราว์เซอร์เพื่อแอบข้ามหน้า
        window.addEventListener('pageshow', function (event) {
            if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
                window.location.reload(); // บังคับรีเฟรชหน้าจอเพื่อตรวจสอบสิทธิ์ใหม่
            }
        });
    </script>
    <style>
        body { 
            margin: 0; 
            font-family: 'Sarabun', 'TH Sarabun PSK', sans-serif; 
            background: #0f172a; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-image: radial-gradient(#1e293b 1px, transparent 1px); 
            background-size: 30px 30px; 
            color: #0f172a; 
        }
        
        .quiz-container { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); width: 650px; border: 4px solid #0ea5e9; transition: 0.3s; }
        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; }
        .quiz-title { margin: 0; font-size: 26px; font-weight: 700; color: #0f172a; }
        
        .selection-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .select-btn { padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; background: white; font-size: 18px; font-weight: bold; font-family: inherit; cursor: pointer; text-align: left; transition: 0.2s; }
        .select-btn:hover { border-color: #0ea5e9; background: #f0f9ff; }
        
        .type-container { display: flex; gap: 20px; justify-content: center; margin: 30px 0; }
        .type-btn { flex: 1; padding: 25px; border: 3px dashed #cbd5e1; border-radius: 20px; font-size: 22px; font-weight: bold; font-family: inherit; cursor: pointer; background: white; transition: 0.3s; text-align: center; }
        .type-btn:hover { border-color: #0ea5e9; color: #0ea5e9; transform: translateY(-3px); }
        .type-btn.pre-hover:hover { border-color: #f59e0b; color: #f59e0b; background: #fffbeb; }
        .type-btn.post-hover:hover { border-color: #10b981; color: #10b981; background: #f0fdf4; }

        .quiz-footer { display: flex; justify-content: space-between; margin-top: 20px; }
        .btn { padding: 12px 25px; border: none; border-radius: 10px; font-weight: 700; font-family: inherit; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .btn-back { background: #64748b; color: white; }

        /* ====== Modal สไตล์เด้งกลางจอ คุมโทนระบบของมึง ====== */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .modal-content { background: white; padding: 40px; border-radius: 30px; text-align: center; width: 320px; transform: scale(0.7); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 20px 25px rgba(0,0,0,0.2); }
        .modal-content.show { transform: scale(1); }
        .modal-icon { font-size: 70px; margin-bottom: 15px; display: block; }
        .modal-btn { width: 100%; padding: 12px; background: #0f172a; border: none; border-radius: 12px; color: white; font-weight: 700; font-size: 16px; font-family: inherit; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .modal-btn:hover { background: #0ea5e9; }
    </style>
</head>
<body>

    <div class="quiz-container" id="main-box">
        <div class="quiz-header">
            <h2 class="quiz-title" id="main-title">ระบบคัดเลือกแบบทดสอบ</h2>
        </div>

        <div id="step-unit">
            <p style="color:#64748b; font-weight: bold; margin-bottom: 15px; font-size: 18px;">กรุณาเลือกหน่วยการเรียนรู้ที่ต้องการทดสอบ</p>
            <div class="selection-grid" id="unit-grid"></div>
        </div>

        <div id="step-type" style="display: none;">
            <p style="color:#64748b; font-weight: bold; text-align:center; font-size: 18px;">เลือกประเภทการทดสอบของ <span id="selected-unit-text" style="color:#0ea5e9;"></span>:</p>
            <div class="type-container">
                <div class="type-btn pre-hover" onclick="startTest('pre')">📖 แบบทดสอบก่อนเรียน<br><span style="font-size:14px; font-weight:normal; color:#64748b;">(Pre-Test)</span></div>
                <div class="type-btn post-hover" onclick="startTest('post')">📝 แบบทดสอบหลังเรียน<br><span style="font-size:14px; font-weight:normal; color:#64748b;">(Post-Test)</span></div>
            </div>
        </div>

        <div class="quiz-footer">
            <button class="btn btn-back" id="backBtn" onclick="handleBack()">กลับหน้าหลัก</button>
        </div>
    </div>

    <div id="quiz-modal" class="modal-overlay">
        <div class="modal-content" id="modalBox">
            <span id="modalIcon" class="modal-icon">❌</span>
            <h2 id="modalTitle" style="margin-bottom: 10px;">แจ้งเตือน</h2>
            <p id="modalText" style="font-size: 18px; color: #64748b; margin: 0; line-height: 1.5;"></p>
            <button class="modal-btn" id="modalConfirmBtn" onclick="closeQuizModal()">ตกลง</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyANpBI1AVwKW6X2I9EPxmflU81RpumrXwo", authDomain: "teach-af247.firebaseapp.com", projectId: "teach-af247", storageBucket: "teach-af247.firebasestorage.app", messagingSenderId: "540555116590", appId: "1:540555116590:web:23e79da0c82e8c865edfbf", measurementId: "G-52HK2DB5XS" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        const loginUser = localStorage.getItem('userName');
        if (!loginUser) { window.location.href = 'login.html'; }

        const unitNames = [
            "แนะนำรายวิชา", "หน่วยที่ 1 ความรู้พื้นฐาน", "หน่วยที่ 2 อุปกรณ์ภายใน", "หน่วยที่ 3 การเลือกอุปกรณ์", 
            "หน่วยที่ 4 กระบวนการประกอบ", "หน่วยที่ 5 การกำหนดค่า BIOS และ UEFI", "หน่วยที่ 6 การติดตั้งระบบปฏิบัติการ", 
            "หน่วยที่ 7 การติดตั้งซอฟต์แวร์", "หน่วยที่ 8 การทดสอบและวิเคราะห์ระบบ", "หน่วยที่ 9 การแก้ไขปัญหาคอมพิวเตอร์", 
            "หน่วยที่ 10 การบำรุงรักษาและการปรับปรุงระบบ"
        ];

        let currentStep = 'unit'; 
        let selectedUnitNum = 1;
        let cachedScores = {}; 

        // สร้างปุ่มเลือกหน่วย 1-10
        const unitGrid = document.getElementById('unit-grid');
        for(let i = 1; i <= 10; i++) {
            const btn = document.createElement('button');
            btn.className = 'select-btn';
            btn.innerText = unitNames[i];
            btn.onclick = () => selectUnit(i);
            unitGrid.appendChild(btn);
        }

        async function loadUserScores() {
            try {
                const docSnap = await db.collection("users").doc(loginUser).get();
                if (docSnap.exists) {
                    cachedScores = docSnap.data().scores || {};
                }
            } catch (e) {
                console.error(e);
            }
        }

        // ฟังก์ชันสั่งเปิดกล่องโต้ตอบ Modal อเนกประสงค์
        function openQuizModal(isSuccess, title, message, clickAction = null) {
            const modal = document.getElementById("quiz-modal");
            const modalBox = document.getElementById("modalBox");
            const confirmBtn = document.getElementById("modalConfirmBtn");
            
            // ปรับสีไอคอนตามเงื่อนไข (Success = เขียว, Error = แดง)
            document.getElementById("modalIcon").innerText = isSuccess ? "✅" : "❌";
            document.getElementById("modalIcon").style.color = isSuccess ? "#10b981" : "#ef4444";
            document.getElementById("modalTitle").innerText = title;
            document.getElementById("modalText").innerText = message;

            // กำหนดสีปุ่มตกลงให้สอดคล้องกับธีมสถานะ
            confirmBtn.style.background = isSuccess ? "#10b981" : "#0f172a";

            // ผูกฟังก์ชันเวลาคลิกปุ่มตกลง
            if (clickAction) {
                confirmBtn.onclick = clickAction;
            } else {
                confirmBtn.onclick = () => closeQuizModal();
            }

            modal.style.display = "flex";
            setTimeout(() => modalBox.classList.add("show"), 10);
        }

        window.closeQuizModal = () => {
            const modal = document.getElementById("quiz-modal");
            const modalBox = document.getElementById("modalBox");
            modalBox.classList.remove("show");
            setTimeout(() => { modal.style.display = "none"; }, 300);
        };

        function selectUnit(unitNum) {
            selectedUnitNum = unitNum;
            document.getElementById('selected-unit-text').innerText = unitNames[unitNum];
            goToStep('type');
        }

        function goToStep(step) {
            currentStep = step;
            document.getElementById('step-unit').style.display = step === 'unit' ? 'block' : 'none';
            document.getElementById('step-type').style.display = step === 'type' ? 'block' : 'none';
            
            if(step === 'unit') {
                document.getElementById('main-title').innerText = "ระบบคัดเลือกแบบทดสอบ";
                document.getElementById('backBtn').innerText = "กลับหน้าหลัก";
            } else if(step === 'type') {
                document.getElementById('main-title').innerText = "เลือกประเภทการทดสอบ";
                document.getElementById('backBtn').innerText = "ย้อนกลับ";
            }
        }

        function handleBack() {
            if (currentStep === 'unit') { window.location.href = 'index.html'; } 
            else if (currentStep === 'type') { goToStep('unit'); }
        }

        // ฟังก์ชันประมวลผลการเลือกเริ่มทำข้อสอบ
        function startTest(type) {
    console.log("=== เริ่มต้นสแกนสิทธิ์ระบบคัดกรองขั้นสูง ===");
    console.log("ประเภทข้อสอบที่เลือก:", type, " | หน่วยการเรียนรู้ที่เลือก:", selectedUnitNum);

    if (cachedScores === null) {
        alert("⏳ ระบบกำลังซิงค์ข้อมูลคะแนนจากคลาวด์ กรุณารอสักครู่แล้วลองกดใหม่...");
        return;
    }

    const unitData = cachedScores["unit" + selectedUnitNum];
    console.log("ข้อมูลคะแนนปัจจุบันในฐานข้อมูลสำหรับบทนี้คือ:", unitData);

    const targetUrl = "./quiz/do_quiz" + selectedUnitNum + ".html";

    // 📖 ====== เคสที่ 1: ดักจับและคัดกรองฝั่ง "ก่อนเรียน" (Pre-Test) ======
    if (type === 'pre') {
        // 🔒 บล็อกทำซ้ำ: ถ้าเคยทำไปแล้ว (มี unitData และฟิลด์ pre มีคะแนนมากกว่า 0)
        if (unitData && unitData.pre !== undefined && unitData.pre !== null && unitData.pre > 0) {
            console.log("🔒 [BLOCK] ปฏิเสธการเข้าทำ Pre-Test: เนื่องจากมีประวัติคะแนนแล้ว");
            if (typeof openQuizModal === 'function') {
                openQuizModal(false, "ทำข้อสอบซ้ำถูกบล็อก", "เคยทำแบบทดสอบก่อนเรียน (Pre-Test) ของหน่วยนี้ไปแล้ว! ระบบล็อกสิทธิ์ห้ามทำซ้ำเพื่อความโปร่งใสครับไอสัส!");
            } else {
                alert("❌ เคยทำแบบทดสอบก่อนเรียนของหน่วยนี้ไปแล้ว ห้ามทำซ้ำ!");
            }
            return; // 🛑 ตัดจบ ไม่ยอมให้ย้ายหน้า
        }

        // 🟢 ผ่านสิทธิ์: ยังไม่เคยทำมาก่อน เด้ง Modal เขียวต้อนรับสวยๆ ตามฟลูเดิมของมึง
        if (typeof openQuizModal === 'function') {
            openQuizModal(true, "เริ่มทำข้อสอบได้!", "ระบบเตรียมข้อสอบก่อนเรียน หน่วยที่ " + selectedUnitNum + " เรียบร้อยแล้ว ขอให้ทำให้อย่างเต็มที่!", () => {
                window.location.href = targetUrl;
            });
        } else {
            window.location.href = targetUrl;
        }
        return;
    }

    // 📝 ====== เคสที่ 2: ดักจับและคัดกรองฝั่ง "หลังเรียน" (Post-Test) ======
    if (type === 'post') {
        // 🔒 บล็อกทางเข้าที่ 1: ตรรกะเดิม ถ้ายังไม่ได้ทำก่อนเรียน หรือได้คะแนนก่อนเรียนเป็น 0 เป๊ะๆ
        if (!unitData || unitData.pre === undefined || unitData.pre === null || unitData.pre === 0) {
            console.log("🔒 [BLOCK] ปฏิเสธการเข้าทำ Post-Test: เนื่องจากคะแนน Pre เป็น 0 หรือไม่มีค่า");
            if (typeof openQuizModal === 'function') {
                openQuizModal(false, "สิทธิ์เข้าทำข้อสอบถูกบล็อก", "ต้องเข้าทำแบบทดสอบก่อนเรียน (Pre-Test) ให้ผ่านและได้คะแนนมากกว่า 0 ก่อน จึงจะปลดล็อกสิทธิ์ทำหลังเรียนได้!");
            } else {
                alert("❌ ยังไม่ได้ทำแบบทดสอบก่อนเรียน หรือคะแนนก่อนเรียนเป็น 0 ย้อนกลับไปทำก่อนเรียนก่อน!");
            }
            return; // 🛑 ตัดจบ
        }

        // 🔒 บล็อกทำซ้ำที่ 2 (ตัวใหม่!): ถ้าเคยทำหลังเรียนไปแล้ว (ฟิลด์ post มีคะแนนมากกว่า 0)
        if (unitData.post !== undefined && unitData.post !== null && unitData.post > 0) {
            console.log("🔒 [BLOCK] ปฏิเสธการเข้าทำ Post-Test: เนื่องจากเคยทำข้อสอบหลังเรียนไปแล้ว");
            if (typeof openQuizModal === 'function') {
                openQuizModal(false, "ทำข้อสอบซ้ำถูกบล็อก", "เคยส่งผลคะแนนแบบทดสอบหลังเรียน (Post-Test) ของหน่วยนี้เข้าคลาวด์ไปแล้ว! สอบเสร็จแล้วหมดสิทธิ์สอบซ้ำครับ !");
            } else {
                alert("❌ เคยทำแบบทดสอบหลังเรียนของหน่วยนี้ไปแล้ว ห้ามเข้าทำซ้ำ!");
            }
            return; // 🛑 ตัดจบ
        }

        // 🔓 ผ่านสิทธิ์: เคยทำก่อนเรียนแล้ว และยังไม่เคยทำหลังเรียน ปล่อยวาร์ปไปหน้ากรอบเขียวทันที
        console.log("🔓 ผ่านเงื่อนไข! คะแนน Pre มากกว่า 0 และยังไม่เคยทำ Post 🚀 กำลังพาวาร์ป...");
        window.location.href = targetUrl;
    }
}
        loadUserScores();
    </script>
</body>
</html>
