<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคัดเลือกแบบฝึกหัด - KTCM</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <script>
        // 1. ตรวจสอบสถานะล็อกอินปัจจุบันในระบบ
        if (!sessionStorage.getItem('isLoggedIn') || !localStorage.getItem('userName')) {
            sessionStorage.clear();
            localStorage.removeItem('userName');
            window.location.replace('login.html'); // เตะกลับหน้าแรกและล้างประวัติการเข้าชมทันที
        }

        // 2. ป้องกันการกดปุ่ม ย้อนกลับ-ถัดไป (Back-Forward Cache) ของเบราว์เซอร์เพื่อแอบข้ามหน้า
        window.addEventListener('pageshow', function (event) {
            if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
                window.location.reload(); // บังคับรีเฟรชหน้าจอเพื่อตรวจสอบสิทธิ์ใหม่
            }
        });
    </script>
    <style>
        body { 
            margin: 0; 
            font-family: 'Sarabun', sans-serif; 
            background: #0f172a; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-image: radial-gradient(#1e293b 1px, transparent 1px); 
            background-size: 30px 30px; 
            color: #0f172a; 
        }
        
        .quiz-container { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); width: 650px; border: 4px solid #3b82f6; transition: 0.3s; }
        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; }
        .quiz-title { margin: 0; font-size: 26px; font-weight: 700; color: #0f172a; }
        
        .selection-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .select-btn { padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; background: white; font-size: 18px; font-weight: bold; font-family: inherit; cursor: pointer; text-align: left; transition: 0.2s; }
        .select-btn:hover { border-color: #3b82f6; background: #f0f9ff; }
        
        .quiz-footer { display: flex; justify-content: space-between; margin-top: 20px; }
        .btn { padding: 12px 25px; border: none; border-radius: 10px; font-weight: 700; font-family: inherit; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .btn-back { background: #64748b; color: white; }
        .btn-back:hover { background: #475569; }

        /* Modal สไตล์แจ้งเตือนสิทธิ์แบบ Pop-up */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .modal-content { background: white; padding: 40px; border-radius: 30px; text-align: center; width: 340px; transform: scale(0.7); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 20px 25px rgba(0,0,0,0.2); }
        .modal-content.show { transform: scale(1); }
        .modal-icon { font-size: 70px; margin-bottom: 15px; display: block; }
        .modal-btn { width: 100%; padding: 12px; background: #0f172a; border: none; border-radius: 12px; color: white; font-weight: 700; font-size: 16px; font-family: inherit; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .modal-btn:hover { background: #3b82f6; }

        /* สำหรับหน้าจอมือถือที่มีความกว้างไม่เกิน 768px */
@media only screen and (max-width: 768px) {
    /* 1. ขยายกล่องหลักให้เต็มจอ */
    .contact-container, .dashboard-container {
        width: 95%;
        padding: 20px;
    }

    /* 2. จัดการการ์ดอาจารย์ให้เรียงแนวตั้ง */
    .instructor-card {
        flex-direction: column;
        text-align: center;
        gap: 15px;
    }
    .instructor-main {
        flex-direction: column;
        gap: 10px;
    }

    /* 3. ปรับ Stats Grid ใน Dashboard จาก 4 คอลัมน์ เป็น 2 คอลัมน์ */
    .stats-grid {
        grid-template-columns: repeat(2, 1fr);
    }

    /* 4. ปรับขนาดฟอนต์ให้เล็กลงหน่อยในมือถือ */
    .contact-title { font-size: 22px; }
    .stat-value { font-size: 20px; }
}

/* สำหรับมือถือจอเล็กมาก (แนวตั้ง) */
@media only screen and (max-width: 480px) {
    .stats-grid {
        grid-template-columns: 1fr; /* เรียงแถวเดียว */
    }
}
    </style>
</head>
<body>

    <div class="quiz-container" id="main-box">
        <div class="quiz-header">
            <h2 class="quiz-title">ระบบคัดเลือกแบบฝึกหัด</h2>
        </div>

        <div id="step-unit">
            <p style="color:#64748b; font-weight: bold; margin-bottom: 15px; font-size: 18px;">กรุณาเลือกหน่วยการเรียนรู้ที่ต้องการเข้าเล่นเกม</p>
            <div class="selection-grid" id="unit-grid"></div>
        </div>

        <div class="quiz-footer">
            <button class="btn btn-back" onclick="window.location.href='./index.html'">กลับหน้าหลัก</button>
        </div>
    </div>

    <div id="exercise-modal" class="modal-overlay">
        <div class="modal-content" id="modalBox">
            <span id="modalIcon" class="modal-icon">❌</span>
            <h2 id="modalTitle" style="margin-bottom: 10px;">แจ้งเตือน</h2>
            <p id="modalText" style="font-size: 18px; color: #64748b; margin: 0; line-height: 1.5;"></p>
            <button class="modal-btn" id="modalConfirmBtn" onclick="closeExModal()">ตกลง</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyANpBI1AVwKW6X2I9EPxmflU81RpumrXwo", authDomain: "teach-af247.firebaseapp.com", projectId: "teach-af247", storageBucket: "teach-af247.firebasestorage.app", messagingSenderId: "540555116590", appId: "1:540555116590:web:23e79da0c82e8c865edfbf" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        const loginUser = localStorage.getItem('userName');
        if (!loginUser) { window.location.href = 'login.html'; }

        const unitNames = [
            "", "หน่วยที่ 1 ความรู้พื้นฐาน", "หน่วยที่ 2 อุปกรณ์ภายใน", "หน่วยที่ 3 การเลือกอุปกรณ์", 
            "หน่วยที่ 4 กระบวนการประกอบ", "หน่วยที่ 5 การกำหนดค่า BIOS และ UEFI", "หน่วยที่ 6 การติดตั้งระบบปฏิบัติการ", 
            "หน่วยที่ 7 การติดตั้งซอฟต์แวร์", "หน่วยที่ 8 การทดสอบและวิเคราะห์ระบบ", "หน่วยที่ 9 การแก้ไขปัญหาคอมพิวเตอร์", 
            "หน่วยที่ 10 การบำรุงรักษาและการปรับปรุงระบบ"
        ];

        let cachedScores = null; 

        // ดึงคะแนนรอไว้ล่วงหน้า
        async function loadUserScores() {
            try {
                const docSnap = await db.collection("users").doc(loginUser).get();
                if (docSnap.exists) {
                    cachedScores = docSnap.data().scores || {};
                } else {
                    cachedScores = {};
                }
            } catch (e) {
                console.error(e);
                cachedScores = {};
            }
        }

        // วาดปุ่มเมนูเกม 1-10
        const unitGrid = document.getElementById('unit-grid');
        for(let i = 1; i <= 10; i++) {
            const btn = document.createElement('button');
            btn.className = 'select-btn';
            btn.innerText = `🎮 ${unitNames[i]}`;
            btn.onclick = () => selectExerciseUnit(i);
            unitGrid.appendChild(btn);
        }

        function selectExerciseUnit(unitNum) {
            if (cachedScores === null) {
                alert("⏳ ระบบกำลังดึงประวัติคะแนน กรุณารอสักครู่แล้วกดใหม่สัส...");
                return;
            }

            const unitData = cachedScores["unit" + unitNum] || {};
            const targetUrl = "./exercise/exercise" + unitNum + ".html";

            // 🔒 [CRITICAL BLOCK] ตรรกะห้ามส่งซ้ำ: ถ้าเคยทำแล้วและคะแนนฟิลด์ exercise เกิน 0
            if (unitData.exercise !== undefined && unitData.exercise !== null && unitData.exercise > 0) {
                openExModal(false, "ทำแบบฝึกหัดซ้ำถูกบล็อก", "นายน่ะเคยผ่านการเล่นเกมแบบฝึกหัด (Exercise) ของหน่วยนี้ไปแล้ว! ระบบล็อกสิทธิ์ห้ามเข้าเล่นซ้ำเพื่อความโปร่งใสครับไอสัส!");
                return;
            }

            // 🔓 ผ่านฉลุย: วาร์ปไปเล่นเกมประจำบทเรียนนั้นๆ ทันที
            window.location.href = targetUrl;
        }

        function openExModal(isSuccess, title, message) {
            const modal = document.getElementById("exercise-modal");
            const modalBox = document.getElementById("modalBox");
            
            document.getElementById("modalIcon").innerText = isSuccess ? "✅" : "❌";
            document.getElementById("modalIcon").style.color = isSuccess ? "#10b981" : "#ef4444";
            document.getElementById("modalTitle").innerText = title;
            document.getElementById("modalText").innerText = message;

            modal.style.display = "flex";
            setTimeout(() => modalBox.classList.add("show"), 10);
        }

        window.closeExModal = () => {
            const modal = document.getElementById("exercise-modal");
            const modalBox = document.getElementById("modalBox");
            modalBox.classList.remove("show");
            setTimeout(() => { modal.style.display = "none"; }, 300);
        };

        loadUserScores();
    </script>
</body>
</html>
