<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTCM Maintenance Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Sarabun', sans-serif; background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; background-image: radial-gradient(#1e293b 1px, transparent 1px); background-size: 30px 30px; }
        .login-card { background: white; padding: 50px; border-radius: 25px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); width: 350px; text-align: center; border: 4px solid #0ea5e9; }
        .icon { font-size: 40px; margin-bottom: 10px; }
        h2 { color: #0f172a; margin-bottom: 5px; font-weight: 700; }
        p { color: #64748b; margin-bottom: 25px; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 2px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: #0ea5e9; }
        button { width: 100%; padding: 15px; background: #0f172a; border: none; border-radius: 12px; color: white; font-weight: 700; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0ea5e9; transform: translateY(-2px); }

        /* Modal สไตล์เด้งกลางจอ */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .modal-content { background: white; padding: 40px; border-radius: 30px; text-align: center; width: 280px; transform: scale(0.7); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 20px 25px rgba(0,0,0,0.2); }
        .modal-content.show { transform: scale(1); }
        .modal-icon { font-size: 70px; margin-bottom: 15px; display: block; }

        /* สำหรับหน้าจอมือถือที่มีความกว้างไม่เกิน 768px */
@media only screen and (max-width: 768px) {
    /* 1. ขยายกล่องหลักให้เต็มจอ */
    .contact-container, .dashboard-container {
        width: 95%;
        padding: 20px;
    }

    /* 2. จัดการการ์ดอาจารย์ให้เรียงแนวตั้ง */
    .instructor-card {
        flex-direction: column;
        text-align: center;
        gap: 15px;
    }
    .instructor-main {
        flex-direction: column;
        gap: 10px;
    }

    /* 3. ปรับ Stats Grid ใน Dashboard จาก 4 คอลัมน์ เป็น 2 คอลัมน์ */
    .stats-grid {
        grid-template-columns: repeat(2, 1fr);
    }

    /* 4. ปรับขนาดฟอนต์ให้เล็กลงหน่อยในมือถือ */
    .contact-title { font-size: 22px; }
    .stat-value { font-size: 20px; }
}

/* สำหรับมือถือจอเล็กมาก (แนวตั้ง) */
@media only screen and (max-width: 480px) {
    .stats-grid {
        grid-template-columns: 1fr; /* เรียงแถวเดียว */
    }
}
    </style>
</head>
<body>
    <div class="login-card">
        <div class="icon">🛠️</div>
        <h2>KTCM Login</h2>
        <p>Computer Maintenance System</p>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn">ACCESS SYSTEM</button>
    </div>

    <div id="modal" class="modal-overlay">
        <div class="modal-content" id="modalBox">
            <span id="modalIcon" class="modal-icon"></span>
            <h2 id="modalText"></h2>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANpBI1AVwKW6X2I9EPxmflU81RpumrXwo",
            authDomain: "teach-af247.firebaseapp.com",
            projectId: "teach-af247",
            storageBucket: "teach-af247.firebasestorage.app",
            messagingSenderId: "540555116590",
            appId: "1:540555116590:web:23e79da0c82e8c865edfbf",
            measurementId: "G-52HK2DB5XS"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ฟังก์ชันเด้ง Modal
        function showModal(isSuccess, message, redirect = false) {
            const modal = document.getElementById("modal");
            const modalBox = document.getElementById("modalBox");
            const icon = document.getElementById("modalIcon");
            const text = document.getElementById("modalText");

            text.innerText = message;
            icon.innerHTML = isSuccess ? "✅" : "❌";
            icon.style.color = isSuccess ? "#10b981" : "#ef4444";

            modal.style.display = "flex";
            setTimeout(() => modalBox.classList.add("show"), 10);

            setTimeout(() => {
                modalBox.classList.remove("show");
                setTimeout(() => {
                    modal.style.display = "none";
                    if (redirect) window.location.href = 'index.html';
                }, 300);
            }, 1500);
        }

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();

            if (!user || !pass) {
                showModal(false, "กรอกข้อมูลให้ครบ !");
                return;
            }

            try {
                const docSnap = await getDoc(doc(db, "users", user));
                if (docSnap.exists() && docSnap.data().password === pass) {
                    const data = docSnap.data();
                    sessionStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userName', user);
                    localStorage.setItem('firstName', data.firstName);
                    localStorage.setItem('lastName', data.lastName);
                    showModal(true, "ยินดีต้อนรับ !", true); // true = ให้ redirect
                } else {
                    showModal(false, "ชื่อหรือรหัสผ่านผิด!");
                }
            } catch (e) {
                showModal(false, "เชื่อมต่อ Cloud ไม่ได้");
            }
        });
    </script>
</body>
</html>
