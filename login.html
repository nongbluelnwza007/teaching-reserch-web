<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTCM Maintenance Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Sarabun:wght@300;400;500;700&display=swap');
        
        body { 
            margin: 0; 
            font-family: 'Outfit', 'Sarabun', sans-serif; 
            background: #070913; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-image: radial-gradient(rgba(99, 102, 241, 0.15) 1px, transparent 1px); 
            background-size: 24px 24px; 
            color: #f1f5f9;
        }
        
        .login-card { 
            background: rgba(19, 27, 46, 0.75); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 50px 40px; 
            border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            width: 380px; 
            text-align: center; 
            transition: all 0.3s ease; 
        }
        .icon { font-size: 45px; margin-bottom: 12px; }
        h2 { 
            color: #fff; 
            margin-bottom: 6px; 
            font-weight: 800; 
            font-size: 28px;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p { color: #94a3b8; margin-bottom: 30px; font-size: 15px; }
        
        input { 
            width: 100%; 
            padding: 14px 18px; 
            margin-bottom: 15px; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 16px; 
            outline: none; 
            background: rgba(11, 15, 25, 0.6);
            color: #f1f5f9;
            transition: all 0.25s ease; 
        }
        input:focus { 
            border-color: #6366f1; 
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.25);
            background: rgba(11, 15, 25, 0.8);
        }
        
        button { 
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); 
            border: none; 
            border-radius: 12px; 
            color: white; 
            font-weight: 700; 
            cursor: pointer; 
            font-size: 16px;
            transition: all 0.25s ease; 
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
        }
        button:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 15px rgba(99, 102, 241, 0.4);
            filter: brightness(1.05);
        }
        button:active {
            transform: scale(0.98);
        }

        /* Modal สไตล์เด้งกลางจอ */
        .modal-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0, 0, 0, 0.65); 
            backdrop-filter: blur(4px);
            display: none; 
            justify-content: center; 
            align-items: center; 
            z-index: 9999; 
        }
        .modal-content { 
            background: #131b2e; 
            border: 1px solid rgba(255,255,255,0.1);
            padding: 40px; 
            border-radius: 24px; 
            text-align: center; 
            width: 320px; 
            transform: scale(0.75); 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); 
            color: #f1f5f9;
        }
        .modal-content.show { transform: scale(1); }
        .modal-icon { font-size: 70px; margin-bottom: 15px; display: block; }

        /* สำหรับหน้าจอมือถือที่มีความกว้างไม่เกิน 768px */
        @media only screen and (max-width: 768px) {
            .login-card {
                width: 90% !important;
                padding: 30px 20px !important;
            }
            input, button {
                padding: 12px !important;
                font-size: 15px !important;
            }
            .modal-content {
                width: 85% !important;
                padding: 25px 20px !important;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="icon">🛠️</div>
        <h2>KTCM Login</h2>
        <p>Computer Maintenance System</p>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn">ACCESS SYSTEM</button>
    </div>

    <div id="modal" class="modal-overlay">
        <div class="modal-content" id="modalBox">
            <span id="modalIcon" class="modal-icon"></span>
            <h2 id="modalText"></h2>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANpBI1AVwKW6X2I9EPxmflU81RpumrXwo",
            authDomain: "teach-af247.firebaseapp.com",
            projectId: "teach-af247",
            storageBucket: "teach-af247.firebasestorage.app",
            messagingSenderId: "540555116590",
            appId: "1:540555116590:web:23e79da0c82e8c865edfbf",
            measurementId: "G-52HK2DB5XS"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ฟังก์ชันเด้ง Modal
        function showModal(isSuccess, message, redirect = false) {
            const modal = document.getElementById("modal");
            const modalBox = document.getElementById("modalBox");
            const icon = document.getElementById("modalIcon");
            const text = document.getElementById("modalText");

            text.innerText = message;
            icon.innerHTML = isSuccess ? "✅" : "❌";
            icon.style.color = isSuccess ? "#10b981" : "#ef4444";

            modal.style.display = "flex";
            setTimeout(() => modalBox.classList.add("show"), 10);

            setTimeout(() => {
                modalBox.classList.remove("show");
                setTimeout(() => {
                    modal.style.display = "none";
                    if (redirect) window.location.href = 'index.html';
                }, 300);
            }, 1500);
        }

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();

            if (!user || !pass) {
                showModal(false, "กรอกข้อมูลให้ครบ !");
                return;
            }

            try {
                const docSnap = await getDoc(doc(db, "users", user));
                if (docSnap.exists() && docSnap.data().password === pass) {
                    const data = docSnap.data();
                    sessionStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userName', user);
                    localStorage.setItem('firstName', data.firstName);
                    localStorage.setItem('lastName', data.lastName);
                    showModal(true, "ยินดีต้อนรับ !", true); // true = ให้ redirect
                } else {
                    showModal(false, "ชื่อหรือรหัสผ่านผิด!");
                }
            } catch (e) {
                showModal(false, "เชื่อมต่อ Cloud ไม่ได้");
            }
        });
    </script>
</body>
</html>
